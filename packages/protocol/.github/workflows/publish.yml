# Build @indexnetwork/protocol on dev pushes.
# Publish to npm only on pushes to main.
# Reads version from package.json — skips silently if already published.
#
# Requires: GitHub repo secret INDEX_REPO_TOKEN (npm automation token).
name: Publish

on:
  push:
    branches:
      - dev
      - main

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest
    name: Build

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

  publish:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    name: Build and publish to npm

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Check if version already published
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          if npm view "${NAME}@${VERSION}" version &>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} already published — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.check.outputs.skip == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.INDEX_REPO_TOKEN }}
