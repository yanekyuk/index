# Publish @indexnetwork/protocol prereleases from dev and stable releases from main.
# Reads version from package.json — skips silently if already published.
#
# Requires: org-level NPM_TOKEN secret.
name: Publish

on:
  push:
    branches:
      - dev
      - main

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    name: Build and publish to npm

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Determine publish version and tag
        id: meta
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            PUBLISH_VERSION="${BASE_VERSION}-rc.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
            NPM_TAG="rc"
          else
            PUBLISH_VERSION="${BASE_VERSION}"
            NPM_TAG="latest"
          fi

          echo "version=${PUBLISH_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${NPM_TAG}" >> "$GITHUB_OUTPUT"

      - name: Check if version already published
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION="${{ steps.meta.outputs.version }}"
          if npm view "${NAME}@${VERSION}" version &>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} already published — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Rewrite package version for publish
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          node -e "const fs=require('fs'); const path='package.json'; const pkg=JSON.parse(fs.readFileSync(path,'utf8')); pkg.version=process.argv[1]; fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');" "$VERSION"

      - name: Publish
        if: steps.check.outputs.skip == 'false'
        run: npm publish --access public --tag "${{ steps.meta.outputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
