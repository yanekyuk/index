[build]
watchPatterns = ["/backend/**", "/packages/protocol/**", "/bun.lock", "/package.json"]
buildCommand = "bun run build:package:protocol && bun run build:backend"

[deploy]
preDeployCommand = "echo 'skipping migrations: applied manually via Neon MCP'"
startCommand = "cd backend && bun run start"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
