# Notify Slack when code lands on dev or main — via PR merge or direct push.
# Requires: GitHub repo secret SLACK_WEBHOOK_URL (webhook URL for the Slack automation).
name: Changelog to Slack
on:
  pull_request_target:
    types: [closed]
    branches: [dev, main]
  push:
    branches: [dev, main]
jobs:
  notify-pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target' && github.event.pull_request.merged == true
    steps:
      - name: Build payload
        id: payload
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = (pr.body || '').trim();
            const desc = [
              `Merged to ${pr.base.ref}`,
              '',
              `*${pr.title}*`,
              `Author: ${pr.user.login}`,
              ...(body ? ['', body] : []),
              '',
              pr.html_url
            ].join('\n');
            core.setOutput('json', JSON.stringify({ description: desc }));

      - name: Send PR changelog to Slack
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: ${{ steps.payload.outputs.json }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  notify-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Build payload
        id: payload
        uses: actions/github-script@v7
        with:
          script: |
            const commits = context.payload.commits || [];
            const branch = context.ref.replace('refs/heads/', '');
            const compare = context.payload.compare;
            const lines = [
              `Pushed to ${branch}`,
              '',
              ...commits.map(c => `• ${c.message.split('\n')[0]} (${c.author.username})`),
              '',
              compare
            ];
            core.setOutput('json', JSON.stringify({ description: lines.join('\n') }));

      - name: Send push changelog to Slack
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: ${{ steps.payload.outputs.json }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
