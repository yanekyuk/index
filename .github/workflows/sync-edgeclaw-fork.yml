# Syncs the indexnetwork/edgeclaw fork from Edge-City/edgeclaw main, then
# fires the pull-edgeclaw-subtree workflow so the monorepo picks up the
# change. The fork is treated as a derived staging area — `gh repo sync
# --force` discards fork-local commits, which is fine: they are recoverable
# from the monorepo subtree split via the next sync-subtrees run.
name: Sync edgeclaw fork from Edge-City

on:
  workflow_dispatch:

concurrency:
  group: sync-edgeclaw-fork
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'indexnetwork/index'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.SUBTREE_SYNC_PAT }}
    steps:
      - name: Sync fork to Edge-City/edgeclaw main
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "❌ SUBTREE_SYNC_PAT secret is not set."
            exit 1
          fi
          gh repo sync indexnetwork/edgeclaw \
            --source Edge-City/edgeclaw \
            --branch main \
            --force

      - name: Trigger monorepo subtree pull
        run: |
          set -euo pipefail
          gh api repos/indexnetwork/index/dispatches \
            -f event_type=edgeclaw-updated
