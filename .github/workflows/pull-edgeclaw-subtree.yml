name: Pull edgeclaw subtree

on:
  workflow_dispatch:
  repository_dispatch:
    types: [edgeclaw-updated]

concurrency:
  group: pull-edgeclaw-subtree-main
  cancel-in-progress: false

jobs:
  pull:
    if: github.repository == 'indexnetwork/index'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Pull edgeclaw fork
        id: pull
        run: |
          set -euo pipefail
          # The fork at indexnetwork/edgeclaw mirrors Edge-City/edgeclaw main
          # (kept in sync by sync-edgeclaw-fork.yml). Pulling from the fork
          # keeps the monorepo aligned with whatever has been promoted into
          # the fork — by upstream merges or by our own pushes via
          # sync-subtrees.yml.
          git remote add edgeclaw https://github.com/indexnetwork/edgeclaw.git
          git fetch edgeclaw main

          CURRENT_SPLIT=$(git subtree split --prefix=packages/edgeclaw HEAD)
          REMOTE_SHA=$(git rev-parse edgeclaw/main)
          echo "Current split: $CURRENT_SPLIT"
          echo "Fork main:     $REMOTE_SHA"

          if git merge-base --is-ancestor "$REMOTE_SHA" "$CURRENT_SPLIT"; then
            echo "packages/edgeclaw already contains indexnetwork/edgeclaw main."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git subtree pull \
            --prefix=packages/edgeclaw \
            edgeclaw main \
            -m "chore(edgeclaw): pull indexnetwork/edgeclaw fork"

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push changes
        if: steps.pull.outputs.changed == 'true'
        run: git push origin HEAD:main
