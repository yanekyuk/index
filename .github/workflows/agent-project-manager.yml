name: Agent Project Manager

on:
  issues:
    types: [opened, edited]

jobs:
  project-manager:
    if: github.repository == 'indexnetwork/index'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Project Manager
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          COPILOT_MCP_LINEAR_API_KEY: ${{ secrets.COPILOT_MCP_LINEAR_API_KEY }}
        run: |
          copilot \
            --agent=project-manager \
            -p "Sync and enrich issue #${{ github.event.issue.number }}" \
            --allow-all \
            --no-ask-user
