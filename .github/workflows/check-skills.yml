# Verifies that committed skill files match what build:skills would produce.
#
# Skill SKILL.md files are generated from templates in
# packages/protocol/skills/ by scripts/build-skills.ts. They are committed and
# subsequently synced via subtree push to consuming repos. If templates change
# without a fresh build, the synced skills drift silently.
#
# This check fails the PR when committed skill outputs are out of date,
# forcing the author to run `bun run build:skills` and commit the result.
name: Check generated skills

on:
  pull_request:
    branches: [dev, main]

concurrency:
  group: check-skills-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.20"

      - name: Install dependencies
        run: bun install

      - name: Verify generated skill files match templates
        run: |
          bun run build:skills
          if ! git diff --exit-code; then
            echo ""
            echo "❌ Generated skill files are out of date."
            echo "Templates in packages/protocol/skills/ changed without a fresh build."
            echo ""
            echo "Fix: run 'bun run build:skills' locally and commit the changes."
            exit 1
          fi
          echo "✓ Generated skill files match templates."
