# Publish @indexnetwork/protocol to npm when a protocol-v* tag is pushed.
#
# Requires: GitHub repo secret NPM_TOKEN (npm automation token — bypasses OTP).
#
# Usage:
#   git tag protocol-v0.2.0
#   git push upstream protocol-v0.2.0
name: Publish Protocol

on:
  push:
    tags:
      - "protocol-v*"

concurrency:
  group: publish-protocol-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    name: Build and publish to npm

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: packages/protocol

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#protocol-v}" >> "$GITHUB_OUTPUT"

      - name: Sync version in package.json
        working-directory: packages/protocol
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json

      - name: Build
        run: bun run build
        working-directory: packages/protocol

      - name: Publish
        run: npm publish --access public
        working-directory: packages/protocol
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
