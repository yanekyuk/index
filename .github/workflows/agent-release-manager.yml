name: Agent Release Manager

on:
  workflow_dispatch:

jobs:
  release-manager:
    if: github.repository == 'indexnetwork/index'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Release Manager
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          copilot \
            --agent=release-manager \
            -p "Prepare and open the release PR from dev into main" \
            --allow-all \
            --no-ask-user
