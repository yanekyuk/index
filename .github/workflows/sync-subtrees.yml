# Syncs subtree-tracked packages to their canonical repos when dev/main moves.
#
# Replaces the local scripts/hooks/pre-push subtree push. Triggered by direct
# pushes and PR merges (squash, rebase, or merge-commit) into dev/main.
#
# Squash/rebase merges produce diverging split histories between dev and main,
# so the push uses --force-with-lease. Subtree repos are treated as derived
# artifacts; their branches may be force-updated.
name: Sync subtrees

on:
  push:
    branches: [dev, main]
  workflow_dispatch:  # Manual re-run, e.g. after fixing CI auth

concurrency:
  # Serialize per-branch so two pushes can't race on the same subtree branch.
  group: sync-subtrees-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'indexnetwork/index'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - prefix: packages/openclaw-plugin
            repo: indexnetwork/openclaw-plugin
          - prefix: packages/protocol
            repo: indexnetwork/protocol
          - prefix: packages/cli
            repo: indexnetwork/cli
          - prefix: packages/claude-plugin
            repo: indexnetwork/claude-plugin
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # subtree split walks full history
          # Don't persist GITHUB_TOKEN as a git credential — we authenticate
          # the push with SUBTREE_SYNC_PAT embedded in the remote URL, and
          # the persisted extraheader would otherwise override it.
          persist-credentials: false

      - name: Skip if prefix untouched
        id: gate
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "First push on this branch — running."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --quiet "$BEFORE" "${{ github.sha }}" -- "${{ matrix.prefix }}"; then
            echo "No changes in ${{ matrix.prefix }} since $BEFORE — skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected in ${{ matrix.prefix }} — running."
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git identity
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Split and push
        if: steps.gate.outputs.run == 'true'
        env:
          GH_PAT: ${{ secrets.SUBTREE_SYNC_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${GH_PAT:-}" ]; then
            echo "❌ SUBTREE_SYNC_PAT secret is not set."
            exit 1
          fi
          BRANCH="${GITHUB_REF_NAME}"
          echo "Splitting ${{ matrix.prefix }} on $BRANCH..."
          SPLIT_SHA=$(git subtree split --prefix="${{ matrix.prefix }}" "$BRANCH")
          echo "Split SHA: $SPLIT_SHA"
          git push --force-with-lease \
            "https://x-access-token:${GH_PAT}@github.com/${{ matrix.repo }}.git" \
            "${SPLIT_SHA}:refs/heads/${BRANCH}"
          echo "✓ pushed to ${{ matrix.repo }} ($BRANCH)"
