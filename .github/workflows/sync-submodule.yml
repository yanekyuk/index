name: Sync submodule pointer in index repo

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout index repo
        uses: actions/checkout@v4
        with:
          repository: indexnetwork/index
          ref: dev
          token: ${{ secrets.INDEX_REPO_TOKEN }}
          submodules: false

      - name: Point submodule to latest plugin commit
        run: |
          COMMIT_SHA="${{ github.sha }}"
          git update-index --cacheinfo 160000,$COMMIT_SHA,plugin

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet; then
            echo "Submodule already up to date"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            git commit -m "chore: sync plugin submodule to $SHORT_SHA"
            git push
          fi
