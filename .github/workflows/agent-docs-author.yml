name: Agent Docs Author

on:
  pull_request:
    types: [closed]
    branches: [dev]

jobs:
  docs-author:
    if: github.repository == 'indexnetwork/index' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Docs Author
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          copilot \
            --agent=docs-author \
            -p "Run on PR #${{ github.event.pull_request.number }}" \
            --allow-all \
            --no-ask-user
